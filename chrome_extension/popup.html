<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: #4ade80; }
    .dot.red { background: #f87171; }
    .dot.yellow { background: #fbbf24; }
    .info { font-size: 12px; color: #a0a0a0; margin-bottom: 4px; }
    .section { margin-top: 12px; }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #0f0f23;
      color: #fff;
      font-size: 13px;
      margin-bottom: 8px;
    }
    input::placeholder { color: #666; }
    button {
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 6px;
    }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-mode { background: #0f766e; color: #fff; }
    .btn-mode:hover { background: #0d9488; }
    .btn-disabled { background: #333; color: #666; cursor: not-allowed; }
    .hidden { display: none; }
    .stats {
      display: flex; justify-content: space-between;
      background: #0f0f23; border-radius: 6px; padding: 8px 12px;
      margin-top: 8px;
    }
    .stat-item { text-align: center; }
    .stat-value { font-size: 18px; font-weight: 700; color: #fff; }
    .stat-label { font-size: 10px; color: #888; text-transform: uppercase; }
  </style>
</head>
<body>
  <h1>DemoX Capture</h1>

  <!-- Disconnected state -->
  <div id="disconnected">
    <div class="status-row">
      <span class="dot red"></span>
      <span>Not connected</span>
    </div>
    <div class="section">
      <input type="text" id="room-input" placeholder="Room ID (e.g. demo-a1b2c3d4)" />
      <button class="btn-primary" id="connect-btn">Connect</button>
    </div>
    <p class="info">Or open a DemoX demo page — the extension auto-detects the room.</p>
  </div>

  <!-- Connected state -->
  <div id="connected" class="hidden">
    <div class="status-row">
      <span class="dot green"></span>
      <span>Connected</span>
    </div>
    <p class="info" id="room-info"></p>
    <p class="info" id="url-info"></p>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-value" id="event-count">0</div>
        <div class="stat-label">Events</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="mode-display">student</div>
        <div class="stat-label">Mode</div>
      </div>
    </div>

    <div class="section">
      <button class="btn-mode" id="mode-btn">Switch to Demo Mode</button>
      <button class="btn-danger" id="disconnect-btn">Disconnect</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
